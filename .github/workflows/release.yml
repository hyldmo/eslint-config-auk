name: release
on:
  push:
    branches: ['master']

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  test:
    name: Lint and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install dependencies
        run: npm ci

      - run: npm run format:check
      - run: npm run lint

  publish-npm:
    needs: test
    name: Publish on NPM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Release
        env:
          GH_TOKEN: ${{ github.token }}
          NPM_CONFIG_PROVENANCE: true
        run: npm run release
